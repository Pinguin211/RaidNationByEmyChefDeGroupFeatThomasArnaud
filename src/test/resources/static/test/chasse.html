<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Chasses</title>
    <link rel="stylesheet" href="/test/style.css">
</head>
<body>
<header>
    <h1>Test API - Chassess</h1>
    <nav>
        <a href="/test/players">Players</a>
        <a href="/test/classes">Classes</a>
        <a href="/test/groupes">Groupes</a>
		<a href="/test/chasses">Groupes</a>
    </nav>
</header>

<main>
    <section class="left-panel">
        <h2>Ajouter un chasse</h2>
        <p class="helper">Formulaire de creation simple.</p>
        <div id="status" class="status"></div>

        <form id="create-form">
			
			<label for="type">Type de chasse (normaux, alliances, défis) </label>
			<input id="type" name="type" required>
			
			<label for="type"> </label>
			<input id="type" name="type" required>
			
			<label for="role">Session de farm</label>
			<input type="checkbox" id="isFarmSession" name="isFarmSession">
			
			<label for="role">Horaire</label>
			<input type="datetime-local" id="horaire" name="horaire" required>

            <button type="submit">Creer le chasse</button>
        </form>
    </section>

    <section class="right-panel">
        <h2>Liste des chasses</h2>
        <p class="helper">Suppression disponible sur chaque ligne.</p>
        <div id="list" class="entity-list"></div>
    </section>
</main>

<script>
    const viewApiBase = "/test/api/chasses";
    const writeApiBase = "/api/chasses";
    const statusEl = document.getElementById("status");
    const listEl = document.getElementById("list");
    const formEl = document.getElementById("create-form");

    function setStatus(message, ok = true) {
        statusEl.textContent = message;
        statusEl.className = "status " + (ok ? "ok" : "err");
    }

    async function fetchChasses() {
        listEl.innerHTML = "";
        const response = await fetch(viewApiBase);
        if (!response.ok) {
            setStatus("Impossible de charger les chasses.", false);
            return;
        }

        const chasses = await response.json();
        if (chasses.length === 0) {
            listEl.innerHTML = "<div class='entity-item'>Aucun chasse.</div>";
            return;
        }

        chasses.forEach(chasse => {
            const item = document.createElement("div");
            item.className = "entity-item";
            item.innerHTML = `
                <div class="entity-meta">
                    <strong>#${chasse.id} - ${chasse.nom}</strong>
                    <span>Difficulte: ${chasse.difficulte}</span>
					<span>Type: ${chasse.type}</span>
					<span>Farm: ${chasse.isFarmSession}</span>
					<span>Horaire: ${chasse.horaire}</span>
                </div>
                <button class="delete-btn" data-id="${chasse.id}">Supprimer</button>
            `;
            listEl.appendChild(item);
        });
    }

    formEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        const payload = {
			nom: formEl.nom.value,
	        difficulte: formEl.difficulte.value,
	        type: formEl.type.value,
	        isFarmSession: formEl.isFarmSession.checked, 
	        horaire: formEl.horaire.value
        };

        const response = await fetch(writeApiBase, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            setStatus("Creation echouee.", false);
            return;
        }

        formEl.reset();
        setStatus("Chasse aux trésors  creee.");
        await fetchChasses();
    });

    listEl.addEventListener("click", async (event) => {
        if (!event.target.matches(".delete-btn")) {
            return;
        }

        const id = event.target.getAttribute("data-id");
        const response = await fetch(`${writeApiBase}/${id}`, { method: "DELETE" });
        if (!response.ok) {
            setStatus("Suppression echouee.", false);
            return;
        }

        setStatus("Chasse aux trésors supprimee.");
        await fetchChasses();
    });

    fetchChasses();
</script>
</body>
</html>
